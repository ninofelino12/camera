<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Kamera">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="apple-touch-icon" href="icon.svg">
    <title>Kamera App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .camera-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #video {
            width: 100%;
            border-radius: 10px;
            background: #000;
        }

        #canvas {
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 120px;
        }

        #captureBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #captureBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #clearBtn {
            background: #ff6b6b;
            color: white;
        }

        #clearBtn:hover {
            background: #ee5a5a;
            transform: translateY(-2px);
        }

        #exportBtn {
            background: #51cf66;
            color: white;
        }

        #exportBtn:hover {
            background: #40c057;
            transform: translateY(-2px);
        }

        .gallery-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .gallery-section h2 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            cursor: pointer;
        }

        .gallery-item-info {
            padding: 10px;
            font-size: 12px;
            color: #666;
        }

        .gallery-item-info p {
            margin: 5px 0;
            word-break: break-word;
        }

        .gallery-item-info .time {
            color: #667eea;
            font-weight: bold;
        }

        .gallery-item-info .gps {
            color: #51cf66;
        }

        .delete-btn {
            width: 100%;
            padding: 8px;
            background: #ff6b6b;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #ee5a5a;
        }

        .user-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            color: white;
        }

        .user-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .user-section input {
            width: 100%;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.95);
            color: #333;
        }

        .user-section input:focus {
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.3);
        }

        .user-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
        }

        .gallery-item-info .user {
            color: #764ba2;
            font-weight: 600;
        }

        .empty-gallery {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .status {
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .status.success {
            background: #d3f9d8;
            color: #2b8a3e;
        }

        .status.error {
            background: #ffe3e3;
            color: #c92a2a;
        }

        .status.info {
            background: #e7f5ff;
            color: #1971c2;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Kamera App</h1>

        <div class="camera-section">
            <div class="user-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="userEmail">📧 Email User</label>
                    <button onclick="logout()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px;">🚪 Logout</button>
                </div>
                <input type="email" id="userEmail" placeholder="nama@email.com" readonly style="opacity: 0.8;">
                <div class="user-badge" id="userBadge">
                    👤 Upload oleh: <span id="currentUser">Belum diatur</span>
                </div>
            </div>

            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>

            <div class="controls">
                <button id="captureBtn">📸 Ambil Foto</button>
                <button id="clearBtn">🗑️ Hapus Semua</button>
                <button id="exportBtn">📥 Export JSON</button>
                <button id="syncBtn" style="background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);">☁️ Save to Backend</button>
            </div>

            <div id="status" class="status" style="display: none;"></div>
        </div>
        
        <div class="gallery-section">
            <h2>📸 Galeri (<span id="count">0</span> foto)</h2>
            <div class="gallery" id="gallery"></div>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <span class="modal-close" id="modalClose">&times;</span>
        <img id="modalImg" src="" alt="Preview">
    </div>

    <script src="api.js"></script>
    <script>
        // Check authentication
        const currentUser = localStorage.getItem('cameraUser');
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const clearBtn = document.getElementById('clearBtn');
        const exportBtn = document.getElementById('exportBtn');
        const gallery = document.getElementById('gallery');
        const count = document.getElementById('count');
        const status = document.getElementById('status');
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalClose = document.getElementById('modalClose');
        const userEmailInput = document.getElementById('userEmail');
        const currentUserSpan = document.getElementById('currentUser');
        const syncBtn = document.getElementById('syncBtn');

        let photos = [];
        let currentEmail = '';

        // Load user email from localStorage
        function loadUserEmail() {
            // Get email from authenticated user
            const userData = JSON.parse(localStorage.getItem('cameraUser') || '{}');
            const email = userData.email || '';

            if (email) {
                userEmailInput.value = email;
                currentEmail = email;
                currentUserSpan.textContent = email;
                
                // Show demo badge if in demo mode
                const userBadge = document.getElementById('userBadge');
                if (userData.isDemo || userData.provider === 'demo') {
                    userBadge.innerHTML = '👤 Upload oleh: <span id="currentUser">' + email + '</span> <span style="background: #ffd43b; color: #333; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 700; margin-left: 5px;">DEMO</span>';
                }
            }
        }

        // Save user email to localStorage
        userEmailInput.addEventListener('change', () => {
            const email = userEmailInput.value.trim();
            if (email) {
                localStorage.setItem('cameraUserEmail', email);
                currentEmail = email;
                currentUserSpan.textContent = email;
                showStatus('Email user disimpan!', 'success');
            }
        });

        // Load photos from localStorage
        function loadPhotos() {
            const stored = localStorage.getItem('cameraPhotos');
            if (stored) {
                photos = JSON.parse(stored);
            }
            renderGallery();
        }

        // Save photos to localStorage
        function savePhotos() {
            try {
                localStorage.setItem('cameraPhotos', JSON.stringify(photos));
                showStatus('Data berhasil disimpan!', 'success');
            } catch (e) {
                showStatus('Storage penuh! Hapus beberapa foto.', 'error');
            }
        }

        // Sync photos to backend
        syncBtn.addEventListener('click', async () => {
            if (photos.length === 0) {
                showStatus('Tidak ada foto untuk disync', 'info');
                return;
            }

            syncBtn.disabled = true;
            syncBtn.textContent = '⏳ Menyimpan...';

            try {
                // Check backend health first
                const health = await window.CameraAPI.healthCheck();
                if (health.status !== 'ok') {
                    throw new Error('Backend tidak tersedia. Pastikan server berjalan.');
                }

                let synced = 0;
                let failed = 0;
                let skipped = 0;

                for (const photo of photos) {
                    try {
                        // Check if photo already exists
                        const exists = await window.CameraAPI.checkPhotoExists(photo.timestamp, photo.uploadedBy);
                        
                        if (exists) {
                            skipped++;
                            continue;
                        }

                        await window.CameraAPI.uploadPhoto({
                            image: photo.image,
                            email: photo.uploadedBy,
                            timestamp: photo.timestamp,
                            gps: photo.gps || null,
                            device_info: photo.device || null
                        });
                        synced++;
                    } catch (err) {
                        console.error('Failed to sync photo:', err);
                        failed++;
                    }
                }

                let message = `✅ ${synced} foto disimpan`;
                if (skipped > 0) message += `, ${skipped} sudah ada`;
                if (failed > 0) message += `, ${failed} gagal`;
                
                showStatus(message, synced > 0 ? 'success' : 'info');
                
                // Update button style temporarily
                syncBtn.style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
                
            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'error');
                syncBtn.style.background = '#ef4444';
            } finally {
                syncBtn.disabled = false;
                syncBtn.textContent = '☁️ Save to Backend';
                
                // Reset button color after 2 seconds
                setTimeout(() => {
                    syncBtn.style.background = 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)';
                }, 2000);
            }
        });

        // Show status message
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
            status.style.display = 'block';
            
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        // Get GPS coordinates
        function getGPS() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject('Geolocation tidak didukung browser');
                    return;
                }
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        });
                    },
                    (error) => {
                        reject(error.message);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            });
        }

        // Get device information
        function getDeviceInfo() {
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            const vendor = navigator.vendor;
            const language = navigator.language;
            const cores = navigator.hardwareConcurrency || 'N/A';
            const memory = navigator.deviceMemory || 'N/A';
            const screenRes = `${screen.width}x${screen.height}`;
            const pixelRatio = window.devicePixelRatio || 1;
            
            // Detect OS
            let os = 'Unknown';
            if (/Android/i.test(userAgent)) os = 'Android';
            else if (/iPhone|iPad|iPod/i.test(userAgent)) os = 'iOS';
            else if (/Windows/i.test(platform)) os = 'Windows';
            else if (/Mac/i.test(platform)) os = 'macOS';
            else if (/Linux/i.test(platform)) os = 'Linux';
            
            // Detect browser
            let browser = 'Unknown';
            if (/Chrome/i.test(userAgent) && /Google Inc/i.test(vendor)) browser = 'Chrome';
            else if (/Safari/i.test(userAgent) && /Apple Computer/i.test(vendor)) browser = 'Safari';
            else if (/Firefox/i.test(userAgent)) browser = 'Firefox';
            else if (/Edg/i.test(userAgent)) browser = 'Edge';
            
            // Detect device type
            let deviceType = 'Desktop';
            if (/Mobile|Android|iPhone|iPad|iPod/i.test(userAgent)) deviceType = 'Mobile';
            else if (/Tablet/i.test(userAgent)) deviceType = 'Tablet';
            
            return {
                os: os,
                browser: browser,
                deviceType: deviceType,
                platform: platform,
                userAgent: userAgent,
                language: language,
                screenResolution: screenRes,
                pixelRatio: pixelRatio,
                cpuCores: cores,
                memory: memory + ' GB'
            };
        }

        // Initialize camera
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                video.srcObject = stream;
                showStatus('Kamera siap!', 'info');
            } catch (err) {
                showStatus('Gagal mengakses kamera: ' + err.message, 'error');
            }
        }

        // Capture photo
        captureBtn.addEventListener('click', async () => {
            captureBtn.disabled = true;
            captureBtn.textContent = '⏳ Memproses...';

            try {
                // Get email from authenticated user
                const userData = JSON.parse(localStorage.getItem('cameraUser') || '{}');
                const email = userData.email;
                
                if (!email) {
                    showStatus('⚠️ User tidak terautentikasi!', 'error');
                    window.location.href = 'login.html';
                    return;
                }

                // Get GPS
                let gps = null;
                try {
                    gps = await getGPS();
                } catch (gpsError) {
                    console.log('GPS error:', gpsError);
                }

                // Get device info
                const deviceInfo = getDeviceInfo();

                // Capture image
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);

                const imageData = canvas.toDataURL('image/jpeg', 0.8);

                // Create photo object
                const photo = {
                    id: Date.now(),
                    image: imageData,
                    timestamp: new Date().toISOString(),
                    gps: gps,
                    device: deviceInfo,
                    uploadedBy: email
                };
                
                photos.unshift(photo);
                savePhotos();
                renderGallery();
                
                showStatus(
                    gps 
                        ? '✅ Foto tersimpan dengan GPS!' 
                        : '✅ Foto tersimpan (GPS tidak tersedia)',
                    gps ? 'success' : 'info'
                );
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
            } finally {
                captureBtn.disabled = false;
                captureBtn.textContent = '📸 Ambil Foto';
            }
        });

        // Render gallery
        function renderGallery() {
            count.textContent = photos.length;

            if (photos.length === 0) {
                gallery.innerHTML = '<div class="empty-gallery">Belum ada foto. Ambil foto pertama Anda!</div>';
                return;
            }

            gallery.innerHTML = photos.map(photo => {
                const date = new Date(photo.timestamp);
                const dateStr = date.toLocaleDateString('id-ID', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });

                let gpsHtml = '<span class="gps">📍 GPS tidak tersedia</span>';
                let mapLink = '#';

                if (photo.gps) {
                    const coords = `${photo.gps.latitude.toFixed(6)}, ${photo.gps.longitude.toFixed(6)}`;
                    mapLink = `https://www.google.com/maps?q=${photo.gps.latitude},${photo.gps.longitude}`;
                    gpsHtml = `
                        <span class="gps">📍 ${coords}</span>
                        <a href="${mapLink}" target="_blank" style="color: #1971c2; display: block; margin-top: 5px;">🗺️ Lihat di Maps</a>
                    `;
                }

                const device = photo.device || {};
                const deviceHtml = device.os ? `
                    <p style="color: #764ba2; margin-top: 5px;">
                        📱 ${device.deviceType || 'Mobile'} • ${device.os || 'Unknown'} • ${device.browser || 'Unknown'}
                    </p>
                    <p style="color: #999; font-size: 11px; margin-top: 3px;">
                        📐 ${device.screenResolution || 'N/A'} • 🔍 ${device.pixelRatio || 'N/A'}x
                    </p>
                ` : '';

                const uploadedBy = photo.uploadedBy || 'Unknown';
                const userHtml = `
                    <p class="user" style="margin-top: 5px;">
                        👤 Upload: ${uploadedBy}
                    </p>
                `;

                return `
                    <div class="gallery-item">
                        <img src="${photo.image}" alt="Photo" onclick="viewModal('${photo.image}')">
                        <div class="gallery-item-info">
                            <p class="time">🕐 ${dateStr}</p>
                            ${gpsHtml}
                            ${deviceHtml}
                            ${userHtml}
                        </div>
                        <button class="delete-btn" onclick="deletePhoto(${photo.id})">🗑️ Hapus</button>
                    </div>
                `;
            }).join('');
        }

        // Delete photo
        window.deletePhoto = function(id) {
            if (confirm('Hapus foto ini?')) {
                photos = photos.filter(p => p.id !== id);
                savePhotos();
                renderGallery();
                showStatus('Foto dihapus', 'info');
            }
        };

        // Clear all photos
        clearBtn.addEventListener('click', () => {
            if (confirm('Hapus semua foto dari galeri?')) {
                photos = [];
                savePhotos();
                renderGallery();
                showStatus('Semua foto dihapus', 'info');
            }
        });

        // Export to JSON
        exportBtn.addEventListener('click', () => {
            if (photos.length === 0) {
                showStatus('Tidak ada foto untuk diexport', 'error');
                return;
            }

            const exportData = photos.map(p => ({
                id: p.id,
                timestamp: p.timestamp,
                gps: p.gps,
                device: p.device,
                uploadedBy: p.uploadedBy
            }));

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `camera-data-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showStatus(`${photos.length} data foto diexport!`, 'success');
        });

        // Modal functions
        window.viewModal = function(imageSrc) {
            modalImg.src = imageSrc;
            modal.classList.add('active');
        };

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        // Logout function
        function logout() {
            if (confirm('Logout dari aplikasi?')) {
                localStorage.removeItem('cameraUser');
                window.location.href = 'login.html';
            }
        }

        // Initialize
        initCamera();
        loadPhotos();
        loadUserEmail();

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.error('SW registration failed:', err));
        }
    </script>
</body>
</html>
