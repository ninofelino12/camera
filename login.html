<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Login - Kamera App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: #4285F4;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .google-btn:hover {
            background: #3367D6;
            box-shadow: 0 5px 20px rgba(66, 133, 244, 0.4);
            transform: translateY(-2px);
        }

        .google-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .google-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .divider {
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #eee;
        }

        .divider span {
            position: relative;
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 12px;
        }

        .manual-login {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .manual-login:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .features {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #666;
        }

        .user-info {
            display: none;
            margin-bottom: 20px;
        }

        .user-info.active {
            display: block;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid #667eea;
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .user-email {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ee5a5a;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .config-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-size: 12px;
            color: #856404;
            text-align: left;
        }

        .config-note code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">📷</div>
        <h1>Kamera App</h1>
        <p class="subtitle">Login untuk menyimpan foto dengan data lengkap</p>

        <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" alt="User Avatar">
            <div class="user-name" id="userName"></div>
            <div class="user-email" id="userEmail"></div>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <div id="loginForm">
            <button class="google-btn" id="googleBtn" onclick="googleLogin()">
                <svg viewBox="0 0 24 24">
                    <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
                </svg>
                Login dengan Google
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #666;">Memproses login...</p>
            </div>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <input type="email" class="manual-login" id="manualEmail" placeholder="Masukkan email Anda">
            <button class="login-btn" onclick="manualLogin()">Lanjut</button>
            <p class="error-msg" id="errorMsg"></p>

            <div class="config-note" id="configNote">
                <strong>⚙️ Setup Google OAuth:</strong><br>
                1. Buka <a href="https://console.cloud.google.com/" target="_blank">Google Cloud Console</a><br>
                2. Buat project baru<br>
                3. Enable Google+ API<br>
                4. Buat OAuth 2.0 Client ID<br>
                5. Add authorized redirect URI: <code id="redirectUri"></code><br>
                6. Copy Client ID ke file <code>login.html</code> (baris ~305)
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // KONFIGURASI GOOGLE OAUTH 2.0
        // ============================================
        // Ganti dengan Client ID dari Google Cloud Console
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
        // ============================================

        const API_KEY = 'YOUR_API_KEY'; // Optional, untuk production
        const REDIRECT_URI = window.location.origin + '/callback.html';
        const SCOPE = 'email profile';

        // Show current origin for config
        document.getElementById('originUrl').textContent = window.location.origin;
        document.getElementById('redirectUri').textContent = REDIRECT_URI;

        // Check if user already logged in
        function checkAuth() {
            const user = localStorage.getItem('cameraUser');
            if (user) {
                const userData = JSON.parse(user);
                showUserInfo(userData);
            }

            // Check for URL hash (after OAuth redirect)
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                handleOAuthResponse(hash);
            }
        }

        // Show user info after login
        function showUserInfo(userData) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('userInfo').classList.add('active');
            document.getElementById('userAvatar').src = userData.avatar || 'https://lh3.googleusercontent.com/a/default-user=s100';
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userEmail').textContent = userData.email;
        }

        // Google OAuth 2.0 Login
        function googleLogin() {
            if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com') {
                alert('⚠️ Google Client ID belum dikonfigurasi!\n\nSilakan setup Google OAuth 2.0:\n1. Buka https://console.cloud.google.com/\n2. Buat project & enable Google+ API\n3. Buat OAuth 2.0 Client ID\n4. Add authorized redirect URI: ' + REDIRECT_URI + '\n5. Copy Client ID ke file login.html (baris ~305)');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('googleBtn').disabled = true;

            // Build OAuth URL
            const authUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' +
                'client_id=' + encodeURIComponent(GOOGLE_CLIENT_ID) + '&' +
                'redirect_uri=' + encodeURIComponent(REDIRECT_URI) + '&' +
                'response_type=token&' +
                'scope=' + encodeURIComponent(SCOPE) + '&' +
                'access_type=offline&' +
                'prompt=select_account';

            // Open popup for OAuth
            const width = 500;
            const height = 600;
            const left = (screen.width - width) / 2;
            const top = (screen.height - height) / 2;
            
            window.open(
                authUrl,
                'Google Login',
                `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no`
            );
        }

        // Listen for OAuth response from popup
        window.addEventListener('message', (event) => {
            if (event.origin !== window.location.origin) return;

            if (event.data.type === 'oauth-success') {
                handleOAuthResponse(event.data.hash);
            } else if (event.data.type === 'oauth-error') {
                showError('Login gagal: ' + event.data.hash);
                document.getElementById('googleBtn').disabled = false;
            }
        });

        // Handle OAuth response (called from callback.html)
        function handleOAuthResponse(hash) {
            const params = new URLSearchParams(hash.substring(1));
            const accessToken = params.get('access_token');
            const error = params.get('error');

            if (error) {
                showError('Login gagal: ' + error);
                return;
            }

            if (accessToken) {
                // Get user info from Google
                fetch('https://www.googleapis.com/oauth2/v2/userinfo?access_token=' + accessToken)
                    .then(response => response.json())
                    .then(data => {
                        const userData = {
                            email: data.email,
                            name: data.name,
                            avatar: data.picture,
                            provider: 'google',
                            googleId: data.id
                        };
                        
                        localStorage.setItem('cameraUser', JSON.stringify(userData));
                        localStorage.setItem('cameraUserToken', accessToken);
                        
                        // Remove hash from URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                        
                        redirectToApp();
                    })
                    .catch(err => {
                        console.error('Error fetching user info:', err);
                        showError('Gagal mengambil data user');
                    });
            }
        }

        // Manual login with email
        function manualLogin() {
            const email = document.getElementById('manualEmail').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!email) {
                errorMsg.textContent = '⚠️ Masukkan email Anda';
                errorMsg.style.display = 'block';
                return;
            }

            if (!email.includes('@')) {
                errorMsg.textContent = '⚠️ Email tidak valid';
                errorMsg.style.display = 'block';
                return;
            }

            const userData = {
                email: email,
                name: email.split('@')[0],
                avatar: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(email.split('@')[0]) + '&background=667eea&color=fff',
                provider: 'manual'
            };

            localStorage.setItem('cameraUser', JSON.stringify(userData));
            redirectToApp();
        }

        // Logout
        function logout() {
            if (confirm('Logout dari aplikasi?')) {
                localStorage.removeItem('cameraUser');
                localStorage.removeItem('cameraUserToken');
                location.reload();
            }
        }

        // Show error message
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('googleBtn').disabled = false;
        }

        // Redirect to main app
        function redirectToApp() {
            window.location.href = 'index.html';
        }

        // Handle enter key on manual login
        document.getElementById('manualEmail')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                manualLogin();
            }
        });

        // Initialize
        checkAuth();
    </script>
</body>
</html>
