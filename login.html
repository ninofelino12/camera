<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Login - Kamera App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .google-btn:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
        }

        .google-btn svg {
            width: 24px;
            height: 24px;
        }

        .divider {
            margin: 25px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #eee;
        }

        .divider span {
            position: relative;
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 12px;
        }

        .manual-login {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .manual-login:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            display: none;
        }

        .features {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            font-size: 14px;
            color: #666;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .user-info {
            display: none;
            margin-bottom: 20px;
        }

        .user-info.active {
            display: block;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 3px solid #667eea;
        }

        .user-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .user-email {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #ee5a5a;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">📷</div>
        <h1>Kamera App</h1>
        <p class="subtitle">Login untuk menyimpan foto dengan data lengkap</p>

        <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" alt="User Avatar">
            <div class="user-name" id="userName"></div>
            <div class="user-email" id="userEmail"></div>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>

        <div id="loginForm">
            <button class="google-btn" onclick="googleLogin()">
                <svg viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Login dengan Google
            </button>

            <div class="divider">
                <span>ATAU</span>
            </div>

            <input type="email" class="manual-login" id="manualEmail" placeholder="Masukkan email Anda">
            <button class="login-btn" onclick="manualLogin()">Lanjut</button>
            <p class="error-msg" id="errorMsg"></p>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📸</div>
                <span>Ambil foto dengan kamera</span>
            </div>
            <div class="feature">
                <div class="feature-icon">📍</div>
                <span>Auto-capture GPS location</span>
            </div>
            <div class="feature">
                <div class="feature-icon">🕐</div>
                <span>Timestamp otomatis</span>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <span>Info device lengkap</span>
            </div>
        </div>
    </div>

    <script>
        // Check if user already logged in
        function checkAuth() {
            const user = localStorage.getItem('cameraUser');
            if (user) {
                const userData = JSON.parse(user);
                showUserInfo(userData);
            }
        }

        // Show user info after login
        function showUserInfo(userData) {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('userInfo').classList.add('active');
            document.getElementById('userAvatar').src = userData.avatar || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(userData.name) + '&background=667eea&color=fff';
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userEmail').textContent = userData.email;
        }

        // Google Login (simulated - for production use Firebase or Google OAuth)
        function googleLogin() {
            // For production: Use Google OAuth 2.0 or Firebase Authentication
            // This is a simplified version using Google account picker
            
            const googleAuthUrl = 'https://accounts.google.com/o/oauth2/v2/auth?' + 
                'client_id=YOUR_GOOGLE_CLIENT_ID&' +
                'redirect_uri=' + encodeURIComponent(window.location.origin + '/callback.html') + '&' +
                'response_type=token&' +
                'scope=email%20profile&' +
                'access_type=offline';
            
            // For demo purposes, we'll use a simple prompt
            const email = prompt('Masukkan email Google Anda:\n(Untuk production, gunakan Google OAuth 2.0)');
            
            if (email && email.includes('@')) {
                const userData = {
                    email: email,
                    name: email.split('@')[0],
                    avatar: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(email.split('@')[0]) + '&background=667eea&color=fff',
                    provider: 'google'
                };
                
                localStorage.setItem('cameraUser', JSON.stringify(userData));
                redirectToApp();
            } else if (email) {
                alert('Email tidak valid!');
            }
        }

        // Manual login with email
        function manualLogin() {
            const email = document.getElementById('manualEmail').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!email) {
                errorMsg.textContent = '⚠️ Masukkan email Anda';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (!email.includes('@')) {
                errorMsg.textContent = '⚠️ Email tidak valid';
                errorMsg.style.display = 'block';
                return;
            }
            
            const userData = {
                email: email,
                name: email.split('@')[0],
                avatar: 'https://ui-avatars.com/api/?name=' + encodeURIComponent(email.split('@')[0]) + '&background=667eea&color=fff',
                provider: 'manual'
            };
            
            localStorage.setItem('cameraUser', JSON.stringify(userData));
            redirectToApp();
        }

        // Logout
        function logout() {
            if (confirm('Logout dari aplikasi?')) {
                localStorage.removeItem('cameraUser');
                location.reload();
            }
        }

        // Redirect to main app
        function redirectToApp() {
            window.location.href = 'index.html';
        }

        // Handle enter key on manual login
        document.getElementById('manualEmail')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                manualLogin();
            }
        });

        // Initialize
        checkAuth();
    </script>
</body>
</html>
